apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentibridge.fullname" . }}
  labels:
    {{- include "agentibridge.labels" . | nindent 4 }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "agentibridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentibridge.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agentibridge
          image: {{ include "agentibridge.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: AGENTIBRIDGE_TRANSPORT
              value: {{ .Values.config.transport | quote }}
            - name: AGENTIBRIDGE_HOST
              value: {{ .Values.config.host | quote }}
            - name: AGENTIBRIDGE_PORT
              value: {{ .Values.config.port | quote }}
            - name: CLAUDE_CODE_HOME_DIR
              value: {{ .Values.config.claudeHomeDir | quote }}
            - name: AGENTIBRIDGE_POLL_INTERVAL
              value: {{ .Values.config.pollInterval | quote }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: redis-url
            - name: AGENTIBRIDGE_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: api-key
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: agenticore-shared
              mountPath: /claude
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.config.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.config.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: agenticore-shared
          persistentVolumeClaim:
            claimName: {{ .Values.sharedPvcName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
