name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "agentic_bridge/**"
      - "Dockerfile"
      - "Dockerfile.allinone"
      - "docker-compose.yml"
      - "deploy/**"
      - "pyproject.toml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (compose image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-allinone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (all-in-one image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.allinone
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:allinone-latest
            ghcr.io/${{ github.repository }}:allinone-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
