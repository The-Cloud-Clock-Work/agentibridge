# AgentiBridge database stack (pip distribution).
#
# This file is bundled with the agentibridge pip package.
# AgentiBridge runs natively on the host — this compose provides databases only.
#
# Usage (via CLI):
#   agentibridge run         # start databases + native agentibridge
#   agentibridge stop        # stop everything
#   agentibridge logs -f     # follow database logs
#
# Manual usage:
#   cd ~/.agentibridge
#   docker compose up -d
#
# With Cloudflare Tunnel:
#   docker compose --profile tunnel up -d                                    # quick tunnel
#   CLOUDFLARE_TUNNEL_TOKEN=xxx docker compose --profile tunnel-named up -d  # named tunnel

services:
  redis:
    container_name: agentibridge-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - sb_redis_data:/data
    networks:
      - sb-network
    restart: unless-stopped

  postgres:
    container_name: agentibridge-postgres
    image: pgvector/pgvector:pg16
    env_file: agentibridge.env
    ports:
      - "5432:5432"
    volumes:
      - sb_postgres_data:/var/lib/postgresql/data
    networks:
      - sb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentibridge"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  # Quick tunnel: docker compose --profile tunnel up -d
  #   → temporary *.trycloudflare.com URL, no account needed
  # Named tunnel: CLOUDFLARE_TUNNEL_TOKEN=xxx docker compose --profile tunnel-named up -d
  #   → persistent hostname via Cloudflare Zero Trust
  cloudflared:
    container_name: agentibridge-tunnel
    image: cloudflare/cloudflared:latest
    profiles: [tunnel]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sb-network
    restart: unless-stopped
    command: >-
      tunnel --no-autoupdate --url http://host.docker.internal:8100

  cloudflared-named:
    container_name: agentibridge-tunnel-named
    image: cloudflare/cloudflared:latest
    profiles: [tunnel-named]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sb-network
    restart: unless-stopped
    command: >-
      tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  sb_redis_data:
  sb_postgres_data:

networks:
  sb-network:
    driver: bridge
