# Standalone AgentiBridge stack (pip distribution).
#
# This file is bundled with the agentibridge pip package.
# It pulls the pre-built image from Docker Hub — no git clone required.
#
# Usage (via CLI):
#   agentibridge run         # start the stack
#   agentibridge stop        # stop the stack
#   agentibridge logs -f     # follow logs
#
# Manual usage:
#   cd ~/.agentibridge
#   docker compose up -d
#
# With Cloudflare Tunnel:
#   docker compose --profile tunnel up -d                                    # quick tunnel
#   CLOUDFLARE_TUNNEL_TOKEN=xxx docker compose --profile tunnel-named up -d  # named tunnel

services:
  agentibridge:
    container_name: agentibridge
    image: tccw/agentibridge:latest
    ports:
      - "8100:8100"
    volumes:
      # Mount host Claude CLI transcripts (read-only)
      - ${CLAUDE_PROJECTS_DIR:-~/.claude/projects}:/home/appuser/.claude/projects:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: docker.env
    networks:
      - sb-network
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  redis:
    container_name: agentibridge-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - sb_redis_data:/data
    networks:
      - sb-network
    restart: unless-stopped
    # Redis port NOT exposed to host (internal only)

  postgres:
    container_name: agentibridge-postgres
    image: pgvector/pgvector:pg16
    env_file: docker.env
    volumes:
      - sb_postgres_data:/var/lib/postgresql/data
    networks:
      - sb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentibridge"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  # Quick tunnel: docker compose --profile tunnel up -d
  #   → temporary *.trycloudflare.com URL, no account needed
  # Named tunnel: CLOUDFLARE_TUNNEL_TOKEN=xxx docker compose --profile tunnel-named up -d
  #   → persistent hostname via Cloudflare Zero Trust
  cloudflared:
    container_name: agentibridge-tunnel
    image: cloudflare/cloudflared:latest
    profiles: [tunnel]
    networks:
      - sb-network
    depends_on:
      agentibridge:
        condition: service_healthy
    restart: unless-stopped
    command: >-
      tunnel --no-autoupdate --url http://agentibridge:8100

  cloudflared-named:
    container_name: agentibridge-tunnel-named
    image: cloudflare/cloudflared:latest
    profiles: [tunnel-named]
    networks:
      - sb-network
    depends_on:
      agentibridge:
        condition: service_healthy
    restart: unless-stopped
    command: >-
      tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  sb_redis_data:
  sb_postgres_data:

networks:
  sb-network:
    driver: bridge
